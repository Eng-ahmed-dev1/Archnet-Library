name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Archneter.Cli/Archneter.Cli.csproj

      - name: Build
        run: dotnet build Archneter.Cli/Archneter.Cli.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Archneter.Cli/Archneter.Cli.csproj --configuration Release --no-build --output ./nupkg

      
      - name: Retrieve NuGet API Key (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: DevAhmed_2008

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate