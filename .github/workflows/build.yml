name: Build and Publish to NuGet

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  id-token: write # Required for NuGet OIDC Trusted Publisher
  contents: read  # Required for checkout

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Archneter.Cli/Archneter.Cli.csproj

    - name: Build
      run: dotnet build Archneter.Cli/Archneter.Cli.csproj -c Release --no-restore

    - name: Pack
      run: dotnet pack Archneter.Cli/Archneter.Cli.csproj -c Release --no-build

    - name: Publish to NuGet
      # The skip-duplicate flag prevents failing if this version is already published
      run: dotnet nuget push Archneter.Cli/nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
